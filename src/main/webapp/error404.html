<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 120px;
            font-weight: 800;
            margin: 0;
            color: #c8ff00;
            letter-spacing: -4px;
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            margin: 10px 0 20px 0;
            text-transform: uppercase;
        }
        p {
            color: #a0a0a0;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            background-color: #c8ff00;
            color: #0a0a0a;
            text-decoration: none;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(200, 255, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Lost in the Streets?</h2>
        <p>The page you are looking for doesn't exist or has been moved to another shoe rack. Let's get you back on track.</p>
        <a href="pages/index.jsp" class="btn-home">Go Back Home</a>
    </div>
</body>
</html>
